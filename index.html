<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyURL</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0e;
      --surface: #222228;
      --surface-hover: #2c2c35;
      --border: #3a3a48;
      --border-hover: #5a5a78;
      --text: #eeeef2;
      --muted: #606070;
      --muted2: #9090a4;
      --accent: #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10,11,15,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      white-space: nowrap;
    }

    #stats {
      color: var(--muted2);
      font-size: 12px;
      white-space: nowrap;
    }

    #search {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 13px;
      width: 200px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(107,156,248,0.1);
    }
    #search::placeholder { color: var(--muted); }

    /* ── Layout ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 28px 48px;
    }

    /* ── Category ── */
    .category-section { margin-bottom: 28px; }

    .category-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .category-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1px 6px;
    }

    /* ── Grid ── */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 6px;
    }

    /* ── Card ── */
    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: border-color 0.12s, background 0.12s;
      min-width: 0;
    }
    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .link-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .link-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .link-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .link-card:hover .link-title { color: var(--accent); }

    .link-sub {
      font-size: 11px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    /* ── Empty states ── */
    #empty, #no-results {
      text-align: center;
      color: var(--muted);
      padding: 72px 0;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>MyURL</h1>
    <span id="stats"></span>
    <input id="search" type="search" placeholder="検索..." autocomplete="off">
  </header>
  <main id="main">
    <div id="empty">
      <p>リンクがまだありません。</p>
      <p style="margin-top:8px;font-size:12px;">ターミナルで <code>./add-link.sh</code> を実行して追加してください。</p>
    </div>
    <div id="no-results">一致するリンクが見つかりません。</div>
  </main>

  <script>
    let allLinks = [];

    async function load() {
      const res = await fetch('links.json?v=' + Date.now());
      const data = await res.json();
      allLinks = data.links || [];
      render(allLinks);
    }

    function render(links) {
      const main = document.getElementById('main');
      const empty = document.getElementById('empty');
      const noResults = document.getElementById('no-results');

      // Remove previous sections
      main.querySelectorAll('.category-section').forEach(el => el.remove());
      empty.style.display = 'none';
      noResults.style.display = 'none';

      if (allLinks.length === 0) {
        empty.style.display = 'block';
        document.getElementById('stats').textContent = '';
        return;
      }

      document.getElementById('stats').textContent = links.length + ' / ' + allLinks.length + ' 件';

      if (links.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      // Group by category
      const grouped = {};
      links.forEach(link => {
        const cat = link.category || '未分類';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(link);
      });

      const sorted = Object.keys(grouped).sort((a, b) => {
        if (a === '未分類') return 1;
        if (b === '未分類') return -1;
        return a.localeCompare(b, 'ja');
      });

      sorted.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'category-section';

        const title = document.createElement('div');
        title.className = 'category-title';
        title.innerHTML = cat + ' <span class="category-count">' + grouped[cat].length + '</span>';
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'links-grid';

        grouped[cat].forEach(link => {
          const a = document.createElement('a');
          a.className = 'link-card';
          a.href = link.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';

          const favicon = document.createElement('img');
          favicon.className = 'link-favicon';
          try {
            const domain = new URL(link.url).origin;
            favicon.src = 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=32';
          } catch {
            favicon.src = '';
          }
          favicon.onerror = () => { favicon.style.visibility = 'hidden'; };
          a.appendChild(favicon);

          const body = document.createElement('div');
          body.className = 'link-body';

          const titleEl = document.createElement('div');
          titleEl.className = 'link-title';
          titleEl.textContent = link.title;
          body.appendChild(titleEl);

          const sub = document.createElement('div');
          sub.className = 'link-sub';
          let hostname = link.url;
          try { hostname = new URL(link.url).hostname.replace(/^www\./, ''); } catch {}
          sub.textContent = hostname;
          body.appendChild(sub);

          a.appendChild(body);

          grid.appendChild(a);
        });

        section.appendChild(grid);
        main.appendChild(section);
      });
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { render(allLinks); return; }
      const filtered = allLinks.filter(l =>
        l.title.toLowerCase().includes(q) ||
        (l.description || '').toLowerCase().includes(q) ||
        (l.category || '').toLowerCase().includes(q) ||
        l.url.toLowerCase().includes(q)
      );
      render(filtered);
    });

    load();
  </script>
</body>
</html>
