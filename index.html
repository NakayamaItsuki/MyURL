<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyURL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0f;
      --surface: #13151f;
      --surface-hover: #1c1f2e;
      --border: #252836;
      --border-hover: #3d4266;
      --text: #dde1f0;
      --muted: #5a6075;
      --muted2: #8890a8;
      --accent: #6b9cf8;
      --accent-dim: rgba(107,156,248,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    #search {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 13px;
      color: var(--text);
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(107,156,248,0.12);
    }
    #search::placeholder { color: var(--muted); }

    #stats {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    .category-section { margin-bottom: 36px; }

    .category-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .category-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px 16px 13px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 9px 0 0 9px;
    }
    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .link-card:hover::before { opacity: 1; }

    .link-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      background: var(--border);
      object-fit: contain;
    }

    .link-body { flex: 1; min-width: 0; }

    .link-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .link-desc {
      font-size: 12px;
      color: var(--muted2);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .link-url {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #empty {
      text-align: center;
      color: var(--muted);
      padding: 80px 0;
      display: none;
    }

    #no-results {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>MyURL</h1>
    <span id="stats"></span>
    <input id="search" type="search" placeholder="検索..." autocomplete="off">
  </header>
  <main id="main">
    <div id="empty">
      <p>リンクがまだありません。</p>
      <p style="margin-top:8px;font-size:12px;">ターミナルで <code>./add-link.sh</code> を実行して追加してください。</p>
    </div>
    <div id="no-results">一致するリンクが見つかりません。</div>
  </main>

  <script>
    let allLinks = [];

    async function load() {
      const res = await fetch('links.json?v=' + Date.now());
      const data = await res.json();
      allLinks = data.links || [];
      render(allLinks);
    }

    function render(links) {
      const main = document.getElementById('main');
      const empty = document.getElementById('empty');
      const noResults = document.getElementById('no-results');

      // Remove previous sections
      main.querySelectorAll('.category-section').forEach(el => el.remove());
      empty.style.display = 'none';
      noResults.style.display = 'none';

      if (allLinks.length === 0) {
        empty.style.display = 'block';
        document.getElementById('stats').textContent = '';
        return;
      }

      document.getElementById('stats').textContent = links.length + ' / ' + allLinks.length + ' 件';

      if (links.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      // Group by category
      const grouped = {};
      links.forEach(link => {
        const cat = link.category || '未分類';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(link);
      });

      const sorted = Object.keys(grouped).sort((a, b) => {
        if (a === '未分類') return 1;
        if (b === '未分類') return -1;
        return a.localeCompare(b, 'ja');
      });

      sorted.forEach(cat => {
        const section = document.createElement('div');
        section.className = 'category-section';

        const title = document.createElement('div');
        title.className = 'category-title';
        title.innerHTML = cat + ' <span class="category-count">' + grouped[cat].length + '</span>';
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'links-grid';

        grouped[cat].forEach(link => {
          const a = document.createElement('a');
          a.className = 'link-card';
          a.href = link.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';

          const favicon = document.createElement('img');
          favicon.className = 'link-favicon';
          try {
            const domain = new URL(link.url).origin;
            favicon.src = 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=32';
          } catch {
            favicon.src = '';
          }
          favicon.onerror = () => { favicon.style.visibility = 'hidden'; };
          a.appendChild(favicon);

          const body = document.createElement('div');
          body.className = 'link-body';

          const titleEl = document.createElement('div');
          titleEl.className = 'link-title';
          titleEl.textContent = link.title;
          body.appendChild(titleEl);

          if (link.description) {
            const desc = document.createElement('div');
            desc.className = 'link-desc';
            desc.textContent = link.description;
            body.appendChild(desc);
          }

          const url = document.createElement('div');
          url.className = 'link-url';
          try { url.textContent = new URL(link.url).hostname; } catch { url.textContent = link.url; }
          body.appendChild(url);

          a.appendChild(body);

          grid.appendChild(a);
        });

        section.appendChild(grid);
        main.appendChild(section);
      });
    }

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      if (!q) { render(allLinks); return; }
      const filtered = allLinks.filter(l =>
        l.title.toLowerCase().includes(q) ||
        (l.description || '').toLowerCase().includes(q) ||
        (l.category || '').toLowerCase().includes(q) ||
        l.url.toLowerCase().includes(q)
      );
      render(filtered);
    });

    load();
  </script>
</body>
</html>
